<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skyline — Weather Station</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background canvas that changes mood with the weather and time of day -->
  <div class="sky" id="sky">
    <div class="sun"></div>
    <div class="moon"></div>
    <div class="stars" id="stars"></div>
    <div class="clouds">
      <div class="cloud cloud--1"></div>
      <div class="cloud cloud--2"></div>
      <div class="cloud cloud--3"></div>
    </div>
    <div class="grain"></div>
  </div>

  <main class="station">

    <!-- ===== Header / Search ===== -->
    <header class="station__header">
      <div class="brand">
        <span class="brand__dot"></span>
        <span class="brand__name">SKYLINE</span>
        <span class="brand__tag">WEATHER STATION</span>
      </div>

      <form class="search" id="searchForm">
        <input
          type="text"
          id="cityInput"
          class="search__input"
          placeholder="Search a city… (e.g. Karachi)"
          autocomplete="off"
        />
        <button type="submit" class="search__btn" aria-label="Search">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="7"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
        <button type="button" class="search__btn search__btn--geo" id="geoBtn" aria-label="Use my location">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
          </svg>
        </button>
      </form>

      <button type="button" class="mode-toggle" id="modeToggle" aria-label="Toggle day/night theme">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" id="modeIcon">
          <circle cx="12" cy="12" r="4.5"/>
          <path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/>
        </svg>
      </button>
    </header>

    <!-- ===== Status line (loading / error) ===== -->
    <p class="status" id="status"></p>

    <!-- ===== Main readout ===== -->
    <section class="readout" id="readout">

      <div class="readout__primary">
        <div class="readout__place">
          <h1 id="cityName">—</h1>
          <p id="dateTime">—</p>
        </div>

        <!-- Live clock: updates every second using setInterval in script.js -->
        <div class="clock" id="clock">
          <span class="clock__time" id="clockTime">00:00:00</span>
          <span class="clock__label">LOCAL TIME</span>
        </div>

        <div class="readout__temp">
          <span id="tempValue">--</span>
          <span class="readout__unit-wrap">
            <button class="unit-toggle" id="unitToggle" type="button">°C</button>
          </span>
        </div>

        <div class="readout__condition">
          <div class="weather-icon" id="weatherIcon"></div>
          <p id="conditionText">Awaiting data…</p>
        </div>
      </div>

      <!-- Gauges: feels-like, wind, humidity, precipitation, UV, sunrise, sunset -->
      <!-- Wind, Humidity, and Precipitation are buttons: click one to see its 24-hour detail. -->
      <div class="gauges" id="gauges">
        <div class="gauge">
          <span class="gauge__label">FEELS LIKE</span>
          <span class="gauge__value" id="feelsLike">--°</span>
        </div>
        <button type="button" class="gauge gauge--clickable" data-metric="wind">
          <span class="gauge__label">WIND</span>
          <span class="gauge__value" id="windSpeed">-- km/h</span>
        </button>
        <button type="button" class="gauge gauge--clickable" data-metric="humidity">
          <span class="gauge__label">HUMIDITY</span>
          <span class="gauge__value" id="humidity">--%</span>
        </button>
        <button type="button" class="gauge gauge--clickable" data-metric="precipitation">
          <span class="gauge__label">PRECIPITATION</span>
          <span class="gauge__value" id="precipitation">--mm</span>
        </button>
        <div class="gauge">
          <span class="gauge__label">UV INDEX</span>
          <span class="gauge__value" id="uvIndex">--</span>
        </div>
        <div class="gauge">
          <span class="gauge__label">SUNRISE</span>
          <span class="gauge__value" id="sunrise">--</span>
        </div>
        <div class="gauge">
          <span class="gauge__label">SUNSET</span>
          <span class="gauge__value" id="sunset">--</span>
        </div>
      </div>
    </section>

    <!-- ===== 24-hour detail popup for wind / humidity / precipitation ===== -->
    <div class="detail-overlay" id="detailOverlay">
      <div class="detail-card">
        <div class="detail-card__header">
          <h2 id="detailTitle">Detail</h2>
          <button type="button" class="detail-card__close" id="detailClose" aria-label="Close">✕</button>
        </div>
        <div class="detail-list" id="detailList"></div>
      </div>
    </div>

    <!-- ===== Hourly strip ===== -->
    <section class="panel" id="hourlyPanel">
      <h2 class="panel__title">Next 24 hours</h2>
      <div class="hourly" id="hourlyStrip"></div>
    </section>

    <!-- ===== 5-day forecast ===== -->
    <section class="panel" id="dailyPanel">
      <h2 class="panel__title">5-day outlook</h2>
      <div class="daily" id="dailyList"></div>
    </section>

    <!-- ===== Recent searches ===== -->
    <section class="panel panel--ghost" id="recentPanel">
      <h2 class="panel__title">Recent</h2>
      <div class="recent" id="recentList"></div>
    </section>

    <footer class="station__footer">
      <p>Data from WeatherAPI.com · Built for a web development assignment</p>
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
